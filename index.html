<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FA BR - Encontre seu Time / Vagas</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml;charset=UTF-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%F0%9F%8F%88%3C%2Ftext%3E%3C%2Fsvg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-overlay"></div>

    <header class="glass-header">
        <div class="logo">
            <i class="fa-solid fa-football"></i>
            <h1>FABR <span>Central</span></h1>
        </div>

        <nav class="main-nav">
            <a href="index.html" class="nav-link active"><i class="fa-solid fa-users-viewfinder"></i> Ver Times</a>
            <a href="cadastro.html" class="nav-link outline-btn"><i class="fa-solid fa-bullhorn"></i> Meu time tem uma
                vaga!</a>
        </nav>
    </header>

    <main class="container">
        <!-- Dashboard Layout - Visualização de Times -->
        <section class="teams-section full-width">
            <div class="section-header">
                <h2>Encontre vagas e tryouts no Futebol Americano do Brasil</h2>
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar por time, cidade ou estado...">
                </div>
            </div>

            <div class="teams-grid" id="teams-grid">
                <!-- Os cards dos times serão renderizados aqui pelo JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
