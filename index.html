<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FA BR - Encontre seu Time </title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏈</text></svg>">
    <!-- Modern API Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-overlay"></div>

    <header class="glass-header">
        <div class="logo">
            <i class="fa-solid fa-football"></i>
            <h1>FABR <span>Central</span></h1>
        </div>

        <nav class="main-nav">
            <a href="index.html" class="nav-link active"><i class="fa-solid fa-users-viewfinder"></i> Ver Times</a>
            <a href="cadastro.html" class="nav-link outline-btn"><i class="fa-solid fa-plus-circle"></i> Cadastrar
                Equipe</a>
        </nav>
    </header>

    <main class="container">
        <!-- Dashboard Layout - Visualização de Times -->
        <section class="teams-section full-width">
            <div class="section-header">
                <h2>Encontre um Time Brasileiro para jogar Futebol Americano</h2>
                <div class="search-bar">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar por time, cidade ou estado...">
                </div>
            </div>

            <div class="teams-grid" id="teams-grid">
                <!-- Os cards dos times serão renderizados aqui pelo JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
